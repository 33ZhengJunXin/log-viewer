<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日志查看器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: system-ui, sans-serif;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
        }

        #fileInput {
            padding: 12px;
            background: #222;
            color: white;
            border: 1px solid #666;
            border-radius: 10px;
            font-size: 16px;
        }

        /* 日志显示区域 */
        #logArea {
            flex: 1;
            background: #000;
            color: #fff;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 10px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            overflow-y: scroll;
            -webkit-overflow-scrolling: touch;

            /* 火狐统一样式 */
            scrollbar-width: 10px;
            scrollbar-color: #888 #222;
        }

        /* ====================================== */
        /* 🔥 核心：全平台统一滚动条样式 */
        /* ====================================== */
        /* Chrome / Edge / Safari / 安卓 / 苹果 */
        #logArea::-webkit-scrollbar {
            width: 10px !important;
            height: 10px !important;
        }
        #logArea::-webkit-scrollbar-track {
            background: #222 !important;
            border-radius: 10px !important;
        }
        #logArea::-webkit-scrollbar-thumb {
            background: #888 !important;
            border-radius: 10px !important;
            border: 2px solid #222 !important;
        }
        #logArea::-webkit-scrollbar-thumb:active {
            background: #aaa !important;
        }

        /* 日志颜色 */
        .I { color: #00FF00; }
        .W { color: #FFFF00; }
        .E { color: #FF0000; }
    </style>
</head>
<body>
    <div class="container">
        <input type="file" id="fileInput" accept=".log">
        <div id="logArea">请导入日志文件</div>
    </div>

    <script>
        const logRegex = /\[(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d+)\].*?deviceId=([0-9a-fA-F:]+).*?body=(\{.*\})/;
        const levelRegex = /line":"([IWE])\s/;
        const fileInput = document.getElementById('fileInput');
        const logArea = document.getElementById('logArea');

        fileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = evt => {
                let out = '';
                evt.target.result.split(/\r?\n/).forEach(line => {
                    const m = line.match(logRegex);
                    const lev = line.match(levelRegex);
                    if (m) {
                        const t = m[1], d = m[2], b = m[3], l = lev ? lev[1] : 'I';
                        out += `<span class="${l}">[${t}] deviceId=${d} body=${b}</span>\n\n`;
                    }
                });
                logArea.innerHTML = out;
            };
            reader.readAsText(file, 'UTF-8');
        });
    </script>
</body>
</html>
