<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>日志查看器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-text-size-adjust: 100%;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
        }

        #fileInput {
            padding: 12px 14px;
            background: #222;
            color: white;
            border: 1px solid #555;
            border-radius: 12px;
            font-size: 16px;
        }

        /* 核心：手机流畅滑动 + 快速拖动 */
        #logArea {
            flex: 1;
            background: #000;
            color: #fff;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #333;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            overflow-y: scroll;
            -webkit-overflow-scrolling: touch; /* 苹果流畅滑动 */
            scroll-behavior: auto !important;
            overscroll-behavior: contain;
        }

        /* 日志颜色 */
        .I { color: #00FF00; }
        .W { color: #FFFF00; }
        .E { color: #FF0000; }
    </style>
</head>
<body>
    <div class="container">
        <input type="file" id="fileInput" accept=".log">
        <div id="logArea">请导入日志文件</div>
    </div>

    <script>
        const logRegex = /\[(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d+)\].*?deviceId=([0-9a-fA-F:]+).*?body=(\{.*\})/;
        const levelRegex = /line":"([IWE])\s/;
        const fileInput = document.getElementById('fileInput');
        const logArea = document.getElementById('logArea');

        fileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = evt => {
                const lines = evt.target.result.split(/\r?\n/);
                let html = '';
                lines.forEach(line => {
                    const m = line.match(logRegex);
                    const lev = line.match(levelRegex);
                    if (m) {
                        const t = m[1], d = m[2], b = m[3], l = lev ? lev[1] : 'I';
                        html += `<span class="${l}">[${t}] deviceId=${d} body=${b}</span>\n\n`;
                    }
                });
                logArea.innerHTML = html;
            };
            reader.readAsText(file, 'UTF-8');
        });
    </script>
</body>
</html>
