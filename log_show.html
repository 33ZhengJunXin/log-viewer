<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>日志查看器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: system-ui, sans-serif;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
        }

        #fileInput {
            padding: 12px;
            background: #222;
            color: white;
            border: 1px solid #666;
            border-radius: 10px;
            font-size: 16px;
        }

        /* 日志区域 */
        #logArea {
            flex: 1;
            background: #000;
            color: #fff;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 10px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            overflow-y: scroll;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        #logArea::-webkit-scrollbar {
            display: none;
        }

        /* --------------------- */
        /* 底部滑块样式（全局统一）*/
        /* --------------------- */
        .slider-container {
            width: 100%;
            padding: 10px 0;
        }

        #scrollSlider {
            width: 100%;
            height: 10px;
            -webkit-appearance: none;
            appearance: none;
            background: #222;
            border-radius: 5px;
            outline: none;
        }

        /* 滑块圆形按钮 */
        #scrollSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            background: #00ccff;
            border-radius: 50%;
            cursor: pointer;
        }

        #scrollSlider::-moz-range-thumb {
            width: 22px;
            height: 22px;
            background: #00ccff;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        /* 日志颜色 */
        .I { color: #00FF00; }
        .W { color: #FFFF00; }
        .E { color: #FF0000; }
    </style>
</head>
<body>
    <div class="container">
        <input type="file" id="fileInput" accept=".log">

        <div id="logArea">请导入日志文件</div>

        <!-- 底部滑动条 -->
        <div class="slider-container">
            <input type="range" id="scrollSlider" min="0" max="100" value="0">
        </div>
    </div>

    <script>
        const logArea = document.getElementById('logArea');
        const scrollSlider = document.getElementById('scrollSlider');
        const fileInput = document.getElementById('fileInput');

        const logRegex = /\[(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d+)\].*?deviceId=([0-9a-fA-F:]+).*?body=(\{.*\})/;
        const levelRegex = /line":"([IWE])\s/;

        // 导入日志
        fileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = evt => {
                let out = '';
                evt.target.result.split(/\r?\n/).forEach(line => {
                    const m = line.match(logRegex);
                    const lev = line.match(levelRegex);
                    if (m) {
                        const t = m[1], d = m[2], b = m[3], l = lev ? lev[1] : 'I';
                        out += `<span class="${l}">[${t}] deviceId=${d} body=${b}</span>\n\n`;
                    }
                });
                logArea.innerHTML = out;
                scrollSlider.value = 0;
            };
            reader.readAsText(file, 'UTF-8');
        });

        // ==============================
        // 核心：滑块拖动 → 跳转到日志位置
        // ==============================
        scrollSlider.addEventListener('input', () => {
            const percent = scrollSlider.value;
            const maxScroll = logArea.scrollHeight - logArea.clientHeight;
            logArea.scrollTop = (percent / 100) * maxScroll;
        });
    </script>
</body>
</html>
