<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>日志查看器（完整版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: system-ui, sans-serif;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 8px;
        }

        #fileInput {
            padding: 12px;
            background: #222;
            color: white;
            border: 1px solid #666;
            border-radius: 10px;
            font-size: 16px;
        }

        .search-bar {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        #searchInput {
            flex: 1;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #555;
            background: #1a1a1a;
            color: #fff;
            font-size: 15px;
        }

        .search-btn, .prev-btn, .next-btn {
            padding: 10px 12px;
            border-radius: 8px;
            border: none;
            background: #0077ff;
            color: white;
            font-size: 14px;
        }

        .prev-btn, .next-btn {
            background: #222;
        }

        .options {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #ccc;
        }

        #logArea {
            flex: 1;
            background: #000;
            color: #fff;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 10px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            overflow-y: scroll;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        #logArea::-webkit-scrollbar {
            display: none;
        }

        .highlight {
            background-color: #ffff00;
            color: #000 !important;
            font-weight: bold;
            padding: 2px 4px;
            border-radius: 3px;
        }

        .current {
            background-color: #ff5500 !important;
            color: #fff !important;
        }

        .slider-container {
            width: 100%;
            padding: 8px 0;
        }

        #scrollSlider {
            width: 100%;
            height: 10px;
            -webkit-appearance: none;
            appearance: none;
            background: #222;
            border-radius: 5px;
            outline: none;
        }

        #scrollSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: #00ccff;
            border-radius: 50%;
        }

        #scrollSlider::-moz-range-thumb {
            width: 22px;
            height: 22px;
            background: #00ccff;
            border-radius: 50%;
            border: none;
        }

        .I { color: #00FF00; }
        .W { color: #FFFF00; }
        .E { color: #FF0000; }
    </style>
</head>
<body>
    <div class="container">
        <input type="file" id="fileInput" accept=".log">

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="搜索日志内容...">
            <button class="search-btn">搜索</button>
            <button class="prev-btn">上一个</button>
            <button class="next-btn">下一个</button>
            <div class="options">
                <label><input type="checkbox" id="caseSensitive"> 区分大小写</label>
            </div>
        </div>

        <div id="logArea">请导入日志文件</div>

        <div class="slider-container">
            <input type="range" id="scrollSlider" min="0" max="100" value="0">
        </div>
    </div>

    <script>
        const logArea = document.getElementById('logArea');
        const scrollSlider = document.getElementById('scrollSlider');
        const fileInput = document.getElementById('fileInput');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.querySelector('.search-btn');
        const prevBtn = document.querySelector('.prev-btn');
        const nextBtn = document.querySelector('.next-btn');
        const caseCheck = document.getElementById('caseSensitive');

        const logRegex = /\[(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d+)\].*?deviceId=([0-9a-fA-F:]+).*?body=(\{.*\})/;
        const levelRegex = /line":"([IWE])\s/;

        let currentIndex = -1;
        let highlights = [];

        // 导入日志
        fileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = evt => {
                let out = '';
                evt.target.result.split(/\r?\n/).forEach(line => {
                    const m = line.match(logRegex);
                    const lev = line.match(levelRegex);
                    if (m) {
                        const t = m[1], d = m[2], b = m[3], l = lev ? lev[1] : 'I';
                        out += `<span class="${l}">[${t}] deviceId=${d} body=${b}</span>\n\n`;
                    }
                });
                logArea.innerHTML = out;
                scrollSlider.value = 0;
                currentIndex = -1;
                highlights = [];
            };
            reader.readAsText(file, 'UTF-8');
        });

        // 滑块控制滚动
        scrollSlider.addEventListener('input', () => {
            const max = logArea.scrollHeight - logArea.clientHeight;
            logArea.scrollTop = (scrollSlider.value / 100) * max;
        });

        // 同步滑块位置
        function syncSlider() {
            const maxScroll = logArea.scrollHeight - logArea.clientHeight;
            if (maxScroll <= 0) return;
            const percent = (logArea.scrollTop / maxScroll) * 100;
            scrollSlider.value = percent;
        }

        // 搜索
        function doSearch() {
            const keyword = searchInput.value.trim();
            if (!keyword) {
                clearHighlight();
                return;
            }
            const caseSensitive = caseCheck.checked;
            const content = logArea.innerHTML;
            clearHighlight();

            const escaped = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const flags = caseSensitive ? 'g' : 'gi';
            const regex = new RegExp(`(${escaped})`, flags);

            let temp = content.replace(/<span class="(I|W|E)">.*?<\/span>/g, (match) => {
                return match.replace(regex, '<span class="highlight">$1</span>');
            });

            logArea.innerHTML = temp;
            highlights = Array.from(logArea.querySelectorAll('.highlight'));
            if (highlights.length > 0) jumpTo(0);
        }

        function clearHighlight() {
            logArea.querySelectorAll('.highlight').forEach(el => {
                el.outerHTML = el.innerHTML;
            });
            currentIndex = -1;
            highlights = [];
        }

        // 跳转到指定高亮 + 同步滑块
        function jumpTo(index) {
            if (highlights.length === 0) return;
            if (currentIndex >= 0 && highlights[currentIndex]) {
                highlights[currentIndex].classList.remove('current');
            }
            currentIndex = (index + highlights.length) % highlights.length;
            const el = highlights[currentIndex];
            el.classList.add('current');

            // 平滑滚动 + 同步滑块
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            // 关键：滚动完成后同步滑块位置
            setTimeout(() => {
                syncSlider();
            }, 200);
        }

        searchBtn.addEventListener('click', doSearch);
        searchInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') doSearch();
        });
        prevBtn.addEventListener('click', () => jumpTo(currentIndex - 1));
        nextBtn.addEventListener('click', () => jumpTo(currentIndex + 1));
    </script>
</body>
</html>
